name: Fetch Crypto News

on:
  schedule:
    - cron: '55 * * * *'
  workflow_dispatch:

concurrency:
  group: crypto-fetch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p workspace

      - name: Fetch news
        run: python .claude/skills/fetch-crypto-news/fetch.py

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workspace/news.json
          if git diff --cached --quiet; then
            echo "no changes to news.json"
          else
            git commit -m "news: refresh headlines [skip ci]"
            git pull --rebase
            git push
          fi
