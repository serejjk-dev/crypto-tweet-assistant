name: Crypto Tweet Drafts (backup)

on:
  workflow_dispatch:

concurrency:
  group: crypto-tweets
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p workspace

      - name: Fetch news
        run: python .claude/skills/fetch-crypto-news/fetch.py

      - name: Rewrite tweet
        run: python .claude/skills/crypto-slang-tone/rewrite.py

      - name: Humanize
        run: python .claude/skills/humanizer/humanize.py

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python .claude/skills/send-to-telegram/send.py

      - name: Commit state back
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workspace/seen.json workspace/drafts.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "state: update seen/drafts [skip ci]"
            git pull --rebase
            git push
          fi
